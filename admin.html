<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phaeton Trucking - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/styles.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <style>
        body { background-color: #f8f9fa; }
        .admin-card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Phaeton Admin Dashboard</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-7">
                <div class="admin-card">
                    <h4>✏️ Edit Website Text</h4>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Main Slogan</label>
                        <input type="text" id="mainSlogan" class="form-control" placeholder="Enter your main slogan...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Paragraph Description</label>
                        <textarea id="mainDesc" class="form-control" rows="3" placeholder="Enter your business description..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Contact Phone 1</label>
                        <input type="text" id="phone1" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Contact Phone 2</label>
                        <input type="text" id="phone2" class="form-control">
                    </div>
                    <button class="btn btn-primary w-100" onclick="saveTextData()">Save Changes</button>
                </div>
            </div>

            <div class="col-md-5">
                <div class="admin-card">
                    <h4>📸 Update Header Photo</h4>
                    <hr>
                    <div class="text-center mb-3">
                        <img id="currentPhoto" src="https://via.placeholder.com/300x200" class="img-fluid rounded" alt="Current Photo">
                    </div>
                    <div class="mb-3">
                        <input class="form-control" type="file" id="photoInput" accept="image/*">
                    </div>
                    <button class="btn btn-success w-100" onclick="uploadPhoto()">Upload & Apply Photo</button>
                    <div class="progress mt-2 d-none" id="uploadProgress">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%">Uploading...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🛑 PASTE YOUR FIREBASE CONFIG HERE 🛑
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        // 🔄 LOAD EXISTING DATA
        db.collection("website_content").doc("landing_page").get().then((doc) => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('mainSlogan').value = data.hero_slogan || '';
                document.getElementById('mainDesc').value = data.hero_desc || '';
                document.getElementById('phone1').value = data.phone_1 || '';
                document.getElementById('phone2').value = data.phone_2 || '';
                if(data.hero_img) {
                    document.getElementById('currentPhoto').src = data.hero_img;
                }
            }
        });

        // 💾 SAVE TEXT DATA
        function saveTextData() {
            db.collection("website_content").doc("landing_page").set({
                hero_slogan: document.getElementById('mainSlogan').value,
                hero_desc: document.getElementById('mainDesc').value,
                phone_1: document.getElementById('phone1').value,
                phone_2: document.getElementById('phone2').value
            }, { merge: true })
            .then(() => alert("🎉 Text updated successfully!"))
            .catch((error) => alert("Error: " + error.message));
        }

        // 📤 UPLOAD PHOTO
        function uploadPhoto() {
            const file = document.getElementById('photoInput').files[0];
            if (!file) return alert("Please select a file first!");

            document.getElementById('uploadProgress').classList.remove('d-none');
            const storageRef = storage.ref('website/hero.jpg');

            storageRef.put(file).then((snapshot) => {
                storageRef.getDownloadURL().then((url) => {
                    db.collection("website_content").doc("landing_page").set({ hero_img: url }, { merge: true })
                    .then(() => {
                        document.getElementById('currentPhoto').src = url;
                        document.getElementById('uploadProgress').classList.add('d-none');
                        alert("🎉 Photo uploaded and applied!");
                    });
                });
            }).catch((error) => alert("Error: " + error.message));
        }
    </script>
</body>
</html>
